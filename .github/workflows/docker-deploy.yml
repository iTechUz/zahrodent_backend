name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧠 SHORT SHA olish
      - name: Set image tag
        id: vars
        run: echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 🐳 Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u 10449 --password-stdin

      # 🔨 Build & push
      - name: Build and push Docker image
        run: |
          docker build -t 10449/zahrodent_backend:${{ github.sha }} .
          docker push 10449/zahrodent_backend:${{ github.sha }}

      # 🔐 Deploy
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHA_TAG: ${{ github.sha }}
        with:
          host: 116.203.244.91
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying commit: ${{ github.sha }}"
            cd /home/ubuntu/zahro-dental/backend || exit 1
            
            # Docker Hub-dan yangi imageni tortib olish
            docker pull 10449/zahrodent_backend:${{ github.sha }}
            
            # Environment variable-ni yangilash (agar kerak bo'lsa)
            export IMAGE_TAG=${{ github.sha }}
            
            # Konteynerlarni yangilash
            docker-compose up -d
            
            # Eskirgan imagelarni tozalash
            docker image prune -f
