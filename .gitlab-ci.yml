
stages:
  - build
  - migrate
  - deploy
  - validate

# 1-BOSQICH: Build
build_job_dev:
  stage: build
  image: node:18-alpine
  script:
    - apk add --no-cache curl
    - npm install
    - npx prisma generate 
    - npm run build
  artifacts:
    paths:
      - dist/
      - node_modules/
      - prisma/
  only:
    - dev
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        STATUS="✅ SUCCESS"
      else
        STATUS="❌ FAILED"
      fi

      TEXT="🔔 GitLab CI Job Notification
      
      Project: $CI_PROJECT_NAME
      Job: $CI_JOB_NAME
      Status: $STATUS
      Author: ${CI_COMMIT_AUTHOR} 
      Merge Title: $CI_MERGE_REQUEST_TITLE"
      curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage -d chat_id=$TELEGRAM_CHAT_ID -d message_thread_id="$TELEGRAM_THREAD_ID" -d text="$TEXT"
build_job_main:
  stage: build
  image: node:18-alpine
  script:
    - apk add --no-cache curl
    - npm install
    - npx prisma generate  # Client generatsiya qilish
    - npm run build
  artifacts:
    paths:
      - dist/
      - node_modules/
      - prisma/
  only:
    - main 
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        STATUS="✅ SUCCESS"
      else
        STATUS="❌ FAILED"
      fi

      TEXT="🔔 GitLab CI Job Notification
      
      Project: $CI_PROJECT_NAME
      Job: $CI_JOB_NAME
      Status: $STATUS
      Author: ${CI_COMMIT_AUTHOR}
      Merge Title: $CI_MERGE_REQUEST_TITLE" 
      curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage -d chat_id=$TELEGRAM_CHAT_ID -d message_thread_id="$TELEGRAM_THREAD_ID" -d text="$TEXT"
# 2-BOSQICH: Migrations (Faqat o'zgarish bo'lsa serverda ishlaydi)
migrate_job_dev:
  stage: migrate
  image: ubuntu:latest
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client rsync curl -y )'
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - |
      ssh -o StrictHostKeyChecking=no $USER@$SERVER_IP << 'EOF'
        cd /home/ubuntu/lmsdev/lms_backend
        git checkout dev
        git pull origin dev
        npm install 
        npx prisma generate # Serverdagi node_modules ichida clientni yangilash
        npx prisma migrate deploy
      
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - prisma/schema.prisma
        - prisma/migrations/**/*
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        STATUS="✅ SUCCESS"
      else
        STATUS="❌ FAILED"
      fi

      TEXT="🔔 GitLab CI Job Notification
      
      Project: $CI_PROJECT_NAME
      Job: $CI_JOB_NAME
      Status: $STATUS
      Author: ${CI_COMMIT_AUTHOR}
      Merge Title: $CI_MERGE_REQUEST_TITLE"
      curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage -d chat_id=$TELEGRAM_CHAT_ID -d message_thread_id="$TELEGRAM_THREAD_ID" -d text="$TEXT"
migrate_job_main:
  stage: migrate
  image: ubuntu:latest
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client rsync curl -y )'
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - |
      ssh -o StrictHostKeyChecking=no $USER@$SERVER_IP << 'EOF'
        cd /home/ubuntu/lms_back_main/lms_backend
        git checkout main
        git pull origin main
        npm install 
        npx prisma generate # Serverdagi node_modules ichida clientni yangilash
        npx prisma migrate deploy
      
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - prisma/schema.prisma
        - prisma/migrations/**/*
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
