notify_telegram:
  stage: validate
  image: alpine:latest
  script:
    - apk add --no-cache curl git
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        STATUS="✅ SUCCESS"
      else
        STATUS="❌ FAILED"
      fi

      MR_URL="$CI_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_IID"

      CHANGES=$(echo "$CI_MERGE_REQUEST_DESCRIPTION" | awk '/## 🔧 Changes/{flag=1; next} /^## /{flag=0} flag')

      CHANGED_FILES=$(git diff --name-only $CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD | head -10)
      FILES_COUNT=$(git diff --name-only $CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD | wc -l)

      TEXT="🔔 *MR Pipeline*

        📦 $CI_PROJECT_NAME
        📝 $CI_MERGE_REQUEST_TITLE

        👤 ${CI_COMMIT_AUTHOR}
        🌿 $CI_COMMIT_REF_NAME → $CI_MERGE_REQUEST_TARGET_BRANCH_NAME

        📂 Files changed ($FILES_COUNT):
        $CHANGED_FILES

        🔧 Changes:
        $CHANGES

        📊 Pipeline: $STATUS

        🔗 $MR_URL
      "

      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d chat_id="$TELEGRAM_CHAT_ID" \
        -d message_thread_id="$TELEGRAM_THREAD_ID" \
        -d parse_mode="Markdown" \
        --data-urlencode text="$TEXT"

  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"