name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🐳 Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u 10449 --password-stdin

      # 🔨 Build & push
      - name: Build and push Docker image
        run: |
          docker build -t 10449/zahrodent_backend:${{ github.sha }} .
          docker push 10449/zahrodent_backend:${{ github.sha }}

      # 🔐 Deploy via Docker Compose
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 116.203.244.91
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROJECT_DIR="/home/ubuntu/projects/zaxro_dent/backend/zahrodent_backend"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # Yangi rasm tegi (tag) ni .env faylga yozish yoki yangilash
            if grep -q "IMAGE_TAG=" .env; then
              sed -i "s|IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|g" .env
            else
              echo "IMAGE_TAG=${{ github.sha }}" >> .env
            fi

            # Serverda docker-compose.yml borligini tekshirish (agar bo'lmasa, ogohlantirish)
            # Izoh: Odatda bu faylni bir marta qo'lda yoki scp orqali tashlab qo'yish tavsiya etiladi.
            
            docker-compose pull api
            docker-compose up -d
            
            # Keraksiz rasmlarni tozalash
            docker image prune -f
